<svg viewBox="0 0 480 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Illustration representing a cloud security baseline document">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#16243F"/>
      <stop offset="1" stop-color="#0E1B32"/>
    </linearGradient>
  </defs>
  <rect width="480" height="300" fill="url(#g1)"/>
  <g opacity="0.5" stroke="#29395C">
    <line x1="0" y1="60" x2="480" y2="60"/>
    <line x1="0" y1="130" x2="480" y2="130"/>
    <line x1="0" y1="200" x2="480" y2="200"/>
    <line x1="0" y1="240" x2="480" y2="240"/>
  </g>
  <!-- cloud -->
  <g transform="translate(240,120)">
    <ellipse cx="0" cy="0" rx="95" ry="42" fill="#1F2E4F"/>
    <ellipse cx="-45" cy="-8" rx="42" ry="30" fill="#1F2E4F"/>
    <ellipse cx="48" cy="-6" rx="46" ry="34" fill="#1F2E4F"/>
  </g>
  <!-- shield -->
  <g transform="translate(240,150)">
    <path d="M0,-58 L52,-38 V10 C52,52 26,80 0,92 C-26,80 -52,52 -52,10 V-38 Z" fill="#C89B3C"/>
    <path d="M-24,4 L-8,22 L26,-18" fill="none" stroke="#0E1B32" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="240" y="272" text-anchor="middle" font-family="IBM Plex Mono, monospace" font-size="13" fill="#8891A2" letter-spacing="2">CLOUD SECURITY BASELINE</text>
